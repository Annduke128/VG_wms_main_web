# ============================================
# WMS v1 — Production Docker Compose
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# ============================================

services:
  postgres:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    deploy:
      resources:
        limits:
          memory: 256M
  migrate:
    profiles: [""]
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://wms:${POSTGRES_PASSWORD}@postgres:5432/wms?sslmode=disable",
        "up",
      ]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      POSTGRES_DSN: postgres://wms:${POSTGRES_PASSWORD}@postgres:5432/wms?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      UPLOAD_DIR: /app/uploads
      STATIC_DIR: web/dist
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: always
    volumes:
      - uploads:/app/uploads
    deploy:
      resources:
        limits:
          memory: 512M

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      POSTGRES_DSN: postgres://wms:${POSTGRES_PASSWORD}@postgres:5432/wms?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      UPLOAD_DIR: /app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: always
    volumes:
      - uploads:/app/uploads
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  pgdata:
  uploads:
